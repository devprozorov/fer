- name: Install Samba packages
  ansible.builtin.apt:
    name:
      - samba
      - samba-common-bin
      - smbclient
    state: present
    update_cache: true

- name: Ensure share directory exists
  ansible.builtin.file:
    path: "{{ samba_share_path }}"
    state: directory
    owner: root
    group: root
    mode: "0770"

- name: Deploy smb.conf
  ansible.builtin.template:
    src: smb.conf.j2
    dest: /etc/samba/smb.conf
    owner: root
    group: root
    mode: "0644"
  notify: restart samba

- name: Ensure Samba services are enabled
  ansible.builtin.service:
    name: "{{ item }}"
    state: started
    enabled: true
  loop:
    - smbd
    - nmbd
