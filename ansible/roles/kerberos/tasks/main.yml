- name: Install Kerberos packages
  ansible.builtin.apt:
    name:
      - krb5-kdc
      - krb5-admin-server
      - krb5-user
    state: present
    update_cache: true

- name: Configure krb5.conf
  ansible.builtin.template:
    src: krb5.conf.j2
    dest: /etc/krb5.conf
    owner: root
    group: root
    mode: "0644"

- name: Configure kdc.conf
  ansible.builtin.template:
    src: kdc.conf.j2
    dest: /etc/krb5kdc/kdc.conf
    owner: root
    group: root
    mode: "0644"

- name: Ensure Kerberos services are running
  ansible.builtin.service:
    name: "{{ item }}"
    state: started
    enabled: true
  loop:
    - krb5-kdc
    - krb5-admin-server
